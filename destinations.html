<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Destinations - Travel Mate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<script src="tm-auth.js"></script>

<style>
:root { --primary:#22c55e; --primary-dark:#16a34a; --bg:#f0fdf4; }
body { font-family:'Plus Jakarta Sans','Poppins',Arial,sans-serif; background:var(--bg); }

/* Override Bootstrap card to match theme */
.card {
  border:none; border-radius:18px;
  box-shadow:0 4px 20px rgba(34,197,94,.1);
  overflow:hidden; transition:transform .25s, box-shadow .25s;
}
.card:hover { transform:translateY(-5px); box-shadow:0 14px 36px rgba(34,197,94,.15); }
.card img { height:200px; object-fit:cover; width:100%; display:block; }
.card-body { padding:16px 18px 18px; }
.card-body h5 { font-weight:700; font-size:1rem; color:#111827; }

/* Page heading */
.dest-page-title {
  font-family:'Playfair Display','Georgia',serif;
  font-size:clamp(1.8rem,3vw,2.4rem);
  font-weight:700; color:#111827; margin-bottom:8px;
}
.dest-page-sub { color:#6b7280; font-size:0.95rem; margin-bottom:24px; }

/* Search bar */
.input-group .form-control {
  border:2px solid #e5e7eb; border-right:none;
  border-radius:50px 0 0 50px; padding:12px 20px;
  font-size:0.93rem; outline:none;
}
.input-group .form-control:focus { border-color:var(--primary); box-shadow:none; }
.input-group .btn-primary {
  background:var(--primary); border:none; border-radius:0 50px 50px 0;
  padding:12px 24px; font-weight:700; font-size:0.93rem;
  transition:background .2s;
}
.input-group .btn-primary:hover { background:var(--primary-dark); }

/* Suggestion / Filter buttons */
.suggestion-btn {
  margin-right:8px; margin-bottom:10px;
  border-radius:50px; padding:8px 20px;
  font-size:0.85rem; font-weight:600; cursor:pointer;
  transition:all .2s;
}
.btn-outline-primary {
  border:2px solid var(--primary); color:var(--primary); background:transparent;
}
.btn-outline-primary:hover {
  background:var(--primary); color:#fff;
}
.btn-outline-secondary {
  border:2px solid #9ca3af; color:#6b7280; background:transparent;
}
.btn-outline-secondary:hover { background:#6b7280; color:#fff; }
</style>
</head>

<body>
    <!-- Back Button -->
    <a href="index.html" class="back-btn" style="position: absolute; top: 24px; left: 24px; z-index: 100; display: flex; align-items: center; gap: 6px; font-weight: 600; color: #22c55e; background: #fff; border-radius: 8px; padding: 7px 16px; box-shadow: 0 2px 8px rgba(34,197,94,.08); text-decoration: none;">
        <i class="fas fa-arrow-left"></i> Back
    </a>
    <!-- ══════════════ NAVBAR (unified) ══════════════ -->
    <nav class="navbar page-bg" id="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">&#10022; Travel<span class="dot">Mate</span></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="main_community.html">Community</a></li>
                <li><a href="findguides.html">Find Guides</a></li>
                <li><a href="travel-mate-dashboard.html">DashBoard</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Register</a></li>
            </ul>
                <div style="display:flex;align-items:center;gap:12px;">
                    <div id="pointsCounter" class="badge badge-teal">0 pts</div>
                </div>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
        </div>
    </nav>


<div class="container" style="padding-top:110px;padding-bottom:60px;">

    <h2 class="dest-page-title">Explore Destinations 🌍</h2>
    <p class="dest-page-sub">Discover the world's most beautiful places — beaches, mountains, cities, and beyond.</p>

    <!-- Search Bar -->
    <div class="input-group mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="Search destinations...">
        <button class="btn btn-primary" onclick="searchDestination()">Search</button>
    </div>

    <!-- Direct Suggestions -->
    <div class="mb-4">
        <button class="btn btn-outline-primary suggestion-btn" onclick="filterCategory('Beach')">Beach</button>
        <button class="btn btn-outline-primary suggestion-btn" onclick="filterCategory('Hill')">Hill Station</button>
        <button class="btn btn-outline-primary suggestion-btn" onclick="filterCategory('City')">City</button>
        <button class="btn btn-outline-primary suggestion-btn" onclick="filterCategory('Adventure')">Adventure</button>
        <button class="btn btn-outline-secondary suggestion-btn" onclick="showAll()">All</button>
    </div>

    <!-- Results Section -->
    <div class="row" id="destinationContainer"></div>

</div>

<script>
    (function(){
        const el = document.getElementById('pointsCounter');
        if(!el) return;
        const pts = Number(localStorage.getItem('tm_points') || 0);
        el.textContent = pts + ' pts';
    })();


// Mock Data (Frontend Only)
const destinations = [
    { name: "Maldives", category: "Beach", image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e" },
    { name: "Manali", category: "Hill", image: "https://images.unsplash.com/photo-1609942072337-4e0b3a9f4a1a" },
    { name: "Paris", category: "City", image: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34" },
    { name: "Rishikesh", category: "Adventure", image: "https://images.unsplash.com/photo-1589308078059-be1415eab4c3" },
    { name: "Goa", category: "Beach", image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb" }
];

const container = document.getElementById("destinationContainer");

// Show All on Load
showAll();

function displayDestinations(filteredList) {
    container.innerHTML = "";

    if(filteredList.length === 0){
        container.innerHTML = "<p>No destinations found.</p>";
        return;
    }

    filteredList.forEach(dest => {
        // Mock rating (random 3-5 stars)
        const rating = Math.floor(Math.random() * 3) + 3;
        container.innerHTML += `
            <div class="col-md-4 mb-4">
                <div class="card position-relative" style="overflow:visible;">
                    <div style="position:absolute;top:10px;right:14px;z-index:2;">
                        <span style="background:#fff;padding:3px 10px;border-radius:12px;font-size:1.1em;color:#fbbf24;font-weight:600;box-shadow:0 1px 6px rgba(0,0,0,0.07);">
                            ${'★'.repeat(rating)}${'☆'.repeat(5-rating)}
                        </span>
                    </div>
                    <img src="${dest.image}" class="card-img-top">
                    <div class="card-body">
                        <div style="display:flex;align-items:center;justify-content:space-between;">
                            <h5 style="margin-bottom:0;">${dest.name}</h5>
                        </div>
                        <p style="margin-top:6px;margin-bottom:12px;color:#6b7280;font-size:0.88rem;">Category: ${dest.category}</p>
                        <a href="community.html?place=${dest.name.toLowerCase().replace(/[^a-z]/g,'')}"
                           style="display:inline-flex;align-items:center;gap:6px;background:#22c55e;color:white;padding:8px 18px;border-radius:50px;font-size:0.85rem;font-weight:600;text-decoration:none;transition:background .2s;"
                           onmouseover="this.style.background='#16a34a'" onmouseout="this.style.background='#22c55e'">
                           <i class="fas fa-map-marker-alt"></i> View Details
                        </a>
                    </div>
                </div>
            </div>
        `;
    });
}

function searchDestination() {
    let searchValue = document.getElementById("searchInput").value.toLowerCase();

    let filtered = destinations.filter(dest =>
        dest.name.toLowerCase().includes(searchValue)
    );

    displayDestinations(filtered);
}

function filterCategory(category) {
    let filtered = destinations.filter(dest =>
        dest.category === category
    );

    displayDestinations(filtered);
}

function showAll() {
    displayDestinations(destinations);
}

</script>

</body>
</html>
